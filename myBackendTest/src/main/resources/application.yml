spring:
  application:
    name: myBackendTest
  profiles:
    active: dev

# ===================== JWT KONFIGURATION =====================
jwt:
  # WICHTIG: In Produktion über Umgebungsvariable setzen! (min. 256 Bit / 32 Bytes Base64)
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCB0b2tlbnMgMTIzNDU2Nzg5MA==}
  access-token-expiration-ms: 3600000      # 1 Stunde
  refresh-token-expiration-ms: 604800000   # 7 Tage

---
# ===================== DEV PROFILE (H2) =====================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:trainingsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  # Seed-Daten deaktiviert (User müssen sich jetzt registrieren)
  sql:
    init:
      mode: never

ai:
  provider: ollama
  ollama:
    base-url: http://localhost:11434
    model: llama3.2
  openai:
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    model: gpt-4o-mini

server:
  port: 8080

---
# ===================== DOCKER PROFILE (PostgreSQL) =====================
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:trainingsdb}
    username: ${DB_USER:trainingsuser}
    password: ${DB_PASS:trainingspass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

ai:
  provider: ${AI_PROVIDER:ollama}
  ollama:
    base-url: ${OLLAMA_URL:http://ollama:11434}
    model: ${OLLAMA_MODEL:llama3.2}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}

server:
  port: 8080
