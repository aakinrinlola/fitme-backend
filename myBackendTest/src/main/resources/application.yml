spring:
  application:
    name: myBackendTest
  profiles:
    active: dev

# ===================== CORS (shared across profiles) =====================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# ===================== JWT KONFIGURATION =====================
jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCB0b2tlbnMgMTIzNDU2Nzg5MA==}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 604800000

# ===================== AUTH MODE =====================
# "local" = eigene JWT-Auth (JwtService + JwtAuthenticationFilter)
# "auth0" = Auth0 OAuth2 Resource Server (RS256 + JWKS)
auth:
  mode: ${AUTH_MODE:local}

---
# ===================== DEV PROFILE (H2 + lokale JWT-Auth) =====================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:trainingsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

ai:
  provider: ollama
  ollama:
    base-url: http://localhost:11434
    model: llama3.2
  openai:
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    model: gpt-4o-mini

server:
  port: 8080

---
# ===================== DOCKER PROFILE (PostgreSQL lokal) =====================
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:trainingsdb}
    username: ${DB_USER:trainingsuser}
    password: ${DB_PASS:trainingspass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

ai:
  provider: ${AI_PROVIDER:ollama}
  ollama:
    base-url: ${OLLAMA_URL:http://ollama:11434}
    model: ${OLLAMA_MODEL:llama3.2}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}

server:
  port: 8080

---
# ===================== PROD PROFILE (Railway + Auth0) =====================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trainingsdb}}
    username: ${DB_USER:}
    password: ${DB_PASS:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  # Auth0 Resource Server — validiert Auth0 JWTs über JWKS
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://YOUR_AUTH0_DOMAIN.eu.auth0.com/}
          audiences: ${AUTH0_AUDIENCE:https://fitme-api}

ai:
  provider: ${AI_PROVIDER:openai}
  ollama:
    base-url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:llama3.2}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}

auth:
  mode: auth0

# Railway setzt PORT automatisch
server:
  port: ${PORT:8080}