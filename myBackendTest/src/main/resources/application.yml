spring:
  application:
    name: myBackendTest
  profiles:
    active: dev

---
# ===================== DEV PROFILE (H2) =====================
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:trainingsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

ai:
  provider: ollama
  ollama:
    base-url: http://localhost:11434
    model: llama3.2
  openai:
    base-url: https://api.openai.com/v1
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    model: gpt-4o-mini

server:
  port: 8080

---
# ===================== DOCKER PROFILE (PostgreSQL) =====================
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:trainingsdb}
    username: ${DB_USER:trainingsuser}
    password: ${DB_PASS:trainingspass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

ai:
  provider: ${AI_PROVIDER:ollama}
  ollama:
    base-url: ${OLLAMA_URL:http://ollama:11434}
    model: ${OLLAMA_MODEL:llama3.2}
  openai:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}

server:
  port: 8080
